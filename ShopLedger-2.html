<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>ShopLedger — OPay NICA 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',Roboto,sans-serif;background:#F2F6F8;color:#003049}
:root{--teal:#00A896;--dark:#003049;--tealL:#E0F5F3;--amber:#F4A261;--red:#E63946;--green:#2DC653;--gray:#8A9BB0;--grayL:#F2F6F8;--border:#D4E4E9;--opay:#00C853;--opayD:#007B2E}
.app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:70px}
.header{background:linear-gradient(135deg,#003049 0%,#00535E 100%);padding:16px 18px;color:#fff;display:flex;align-items:center;gap:10px}
.logo-box{width:38px;height:38px;background:var(--teal);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.logo-title{font-size:20px;font-weight:800}
.logo-sub{font-size:10px;color:#E0F5F3;margin-top:1px}
.opay-btn{margin-left:auto;background:var(--opay);color:#fff;border:none;border-radius:10px;padding:7px 12px;font-size:12px;font-weight:800;cursor:pointer}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid var(--border);display:flex;z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,0.08)}
.nav-btn{flex:1;border:none;background:none;padding:9px 0 7px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-icon{font-size:18px}
.nav-label{font-size:9px;font-weight:400;color:var(--gray)}
.nav-btn.active .nav-label{font-weight:800;color:var(--teal)}
.nav-dot{width:18px;height:2.5px;background:var(--teal);border-radius:2px;margin-top:1px;display:none}
.nav-btn.active .nav-dot{display:block}
.content{padding:14px;display:none}
.content.active{display:block}
/* MIC BUTTON */
.mic-outer{display:flex;flex-direction:column;align-items:center;margin:8px 0 16px}
.mic-ring{width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;position:relative}
.mic-ring.idle{background:radial-gradient(circle,#00A896 55%,#00C9B1 100%);box-shadow:0 0 0 12px rgba(0,168,150,0.12),0 8px 28px rgba(0,168,150,0.3)}
.mic-ring.active{background:radial-gradient(circle,#E63946 55%,#FF6B7A 100%);box-shadow:0 0 0 12px rgba(230,57,70,0.15),0 0 0 24px rgba(230,57,70,0.06),0 8px 28px rgba(230,57,70,0.3);animation:pulse .9s infinite}
.mic-ring.processing{background:radial-gradient(circle,#F4A261 55%,#FFCC80 100%);box-shadow:0 0 0 12px rgba(244,162,97,0.15)}
.mic-icon{font-size:40px;z-index:1}
.mic-label{font-size:13px;font-weight:700;margin-top:10px;transition:color .3s}
.mic-hint{font-size:11px;color:var(--amber);font-weight:700;margin-top:4px}
/* WAVES */
.wave-wrap{display:flex;align-items:center;gap:3px;height:28px;margin:10px auto;width:fit-content}
.wave-bar{width:4px;border-radius:4px;background:var(--teal);transition:height .1s}
/* TRANSCRIPT */
.transcript-box{background:var(--grayL);border-radius:14px;padding:12px 16px;margin:10px 0;border:1.5px solid var(--teal);font-size:14px;line-height:1.6;min-height:52px;color:#003049;position:relative}
.transcript-label{font-size:10px;color:var(--teal);font-weight:800;display:block;margin-bottom:4px}
.cursor{display:inline-block;width:2px;height:16px;background:var(--teal);margin-left:2px;vertical-align:middle;animation:blink .7s infinite}
/* LANG BAR */
.lang-bar{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.lang-btn{border:1.5px solid var(--border);background:#fff;color:var(--gray);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.lang-btn.active{background:var(--teal);color:#fff;border-color:var(--teal)}
/* CARDS */
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 1px 10px rgba(0,0,0,0.06)}
.card-lg{background:#fff;border-radius:20px;padding:20px;margin-bottom:14px;box-shadow:0 2px 16px rgba(0,0,0,0.07)}
/* RESULT */
.result-card{border-radius:16px;padding:16px;margin-bottom:14px;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,0.06);animation:fadeIn .3s}
/* BTNS */
.btn{width:100%;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-teal{background:var(--teal);color:#fff}
.btn-dark{background:var(--dark);color:#fff}
.btn-gray{background:var(--border);color:#999;cursor:not-allowed}
.btn-outline{background:var(--grayL);color:var(--dark);border:1.5px solid var(--border)}
/* STATS */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.stat-box{background:#fff;border-radius:12px;padding:12px 8px;text-align:center;box-shadow:0 1px 8px rgba(0,0,0,0.05)}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.kpi-box{background:#fff;border-radius:14px;padding:14px;box-shadow:0 1px 8px rgba(0,0,0,0.05)}
/* BAR CHART */
.chart-wrap{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 8px rgba(0,0,0,0.05)}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-name{font-size:11px;color:var(--gray);width:80px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:var(--grayL);border-radius:20px;height:18px;overflow:hidden}
.bar-fill{background:var(--teal);height:100%;border-radius:20px;transition:width 1s ease}
.bar-val{font-size:11px;font-weight:700;color:var(--dark);width:60px;text-align:right;flex-shrink:0}
/* OPAY BANNER */
.opay-banner{background:linear-gradient(135deg,#007B2E,#00C853);border-radius:16px;padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
/* TOAST */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);color:#fff;padding:10px 22px;border-radius:24px;z-index:9999;font-weight:700;font-size:14px;box-shadow:0 4px 20px rgba(0,0,0,0.25);white-space:nowrap;animation:fadeIn .2s}
/* TELEPROMPTER */
.seg-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px}
.seg-btn{white-space:nowrap;border-radius:20px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;border:1.5px solid var(--border);background:#fff;color:var(--dark)}
.seg-btn.active{background:var(--dark);color:#fff;border-color:var(--dark)}
.prompter{background:#003049;border-radius:18px;padding:18px;margin-bottom:12px;min-height:200px;display:flex;flex-direction:column;justify-content:center}
/* PRESENT */
.present-overlay{position:fixed;inset:0;z-index:9999;display:none;flex-direction:column;background:#000}
.slide-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-y:auto;padding:20px;transition:opacity .22s}
/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--gray)}
/* EXAMPLES */
.ex-item{background:var(--grayL);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:13px;cursor:pointer;border:1px solid var(--border)}
.ex-item:active{background:var(--tealL)}
.section-title{font-size:18px;font-weight:800;margin-bottom:14px}
.tips-box{background:var(--tealL);border-radius:14px;padding:14px;border:1px solid var(--teal)}
.tips-label{font-size:12px;font-weight:800;color:var(--teal);margin-bottom:8px}
.tip-row{font-size:12px;margin-bottom:6px;display:flex;gap:6px}
/* PERM BANNER */
.perm-banner{background:#FFF3CD;border:1.5px solid #F4A261;border-radius:14px;padding:14px;margin-bottom:14px;font-size:13px;color:#7A4F00;text-align:center}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes waveAnim{0%,100%{height:6px}50%{height:22px}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo-box">🛒</div>
    <div><div class="logo-title">ShopLedger</div><div class="logo-sub">Gemini AI + Canva + OPay</div></div>
    <button class="opay-btn" onclick="openOPay()">🏦 OPay</button>
  </div>

  <div class="content active" id="page-home"></div>
  <div class="content" id="page-ledger"></div>
  <div class="content" id="page-report"></div>
  <div class="content" id="page-script"></div>
  <div class="content" id="page-present"></div>

  <nav class="nav">
    <button class="nav-btn active" id="nav-home" onclick="showTab('home')"><span class="nav-icon">🎙️</span><span class="nav-label">Record</span><div class="nav-dot"></div></button>
    <button class="nav-btn" id="nav-ledger" onclick="showTab('ledger')"><span class="nav-icon">📒</span><span class="nav-label">Ledger</span><div class="nav-dot"></div></button>

    <button class="nav-btn" id="nav-script" onclick="showTab('script')"><span class="nav-icon">🎬</span><span class="nav-label">Script</span><div class="nav-dot"></div></button>
    <button class="nav-btn" id="nav-present" onclick="showTab('present')"><span class="nav-icon">🖥️</span><span class="nav-label">Present</span><div class="nav-dot"></div></button>
  </nav>
</div>

<div class="present-overlay" id="present-overlay"></div>

<script>
/* ════════════════════════════════════════════
   STATE
════════════════════════════════════════════ */
var transactions = [];
var lastResult = null;
var reportData = null;
var currentLang = 'en-NG';
var voiceState = 'idle'; // idle | listening | processing
var recognition = null;
var liveTranscript = '';
var finalTranscript = '';
var waveTimer = null;
var currentTab = 'home';

var LANGS = [
  {code:'en-NG', label:'English'},
  {code:'ha',    label:'Hausa'},
  {code:'yo-NG', label:'Yoruba'},
  {code:'ig-NG', label:'Igbo'},
];

var EXAMPLES = [
  "I sold 3 bags of rice for 15,000 naira",
  "Na sayar da jakunkuna uku na shinkafa — Naira dubu goma sha biyar",
  "Sold 10 yards of fabric for 5,000 naira",
  "Customer paid 22,000 naira for groundnut oil",
  "Bought stock worth 8,500 naira from market",
  "Transport cost me 1,200 naira today",
  "Sold 5 crates of eggs for 18,500 naira",
  "Spent 3,000 naira on shop rent"
];

var HAUSA_OK=["Sannu da aiki! An yi rijistar cinikayya.","Alhamdulillah! An lura da kudaden ka.","ShopLedger ya rubuta duk bayanan ka.","An kiyaye rikodin ka lafiya! Ci gaba."];
var ENG_OK=["Transaction recorded successfully!","Great work! Your sale has been logged.","ShopLedger has saved your record.","Keep recording to unlock OPay loans!"];

var SCRIPT=[
  {time:"0:00–0:30",label:"HOOK",lines:["Meet Hajiya Fatima.","She runs a grain business in Maiduguri's Monday Market.","Every day she sells thousands of naira worth of goods.","But tonight, when her son asks how much profit she made...","She cannot answer.","She is not alone.","39 million Nigerians run businesses with no financial records.","Banks say no. Loans are impossible. Growth is blocked.","We asked: what if her VOICE was her ledger?"]},
  {time:"0:30–1:30",label:"SOLUTION",lines:["Introducing ShopLedger —","the voice-powered bookkeeping app built for Nigerian traders.","Watch. I will record a sale the way Fatima would.","[Hausa]: Na sayar da jakunkuna uku na shinkafa — Naira dubu goma sha biyar.","[Translation]: I sold 3 bags of rice for 15,000 naira.","The AI understands Hausa.","It classifies the sale, updates stock, and logs everything.","ShopLedger and Canva auto-generate a professional report.","And when she has 90 days of records —","ShopLedger connects her to OPay for a micro-loan.","For the first time, Fatima has proof. She can grow."]},
  {time:"1:30–2:15",label:"IMPACT",lines:["ShopLedger is not just an app.","It is a financial identity for people who never had one.","Nigeria's informal sector is worth 28 trillion naira a year.","It employs 80% of our workforce.","Yet invisible to every bank, every loan, every opportunity.","Year 1: 50,000 traders across Maiduguri, Kano, and Lagos.","Goal: 500 million naira in micro-loans facilitated.","68% of Northern Nigerian market vendors are women —","ShopLedger is also a gender equity tool.","A model for 400 million informal traders across Africa."]},
  {time:"2:15–2:40",label:"TEAM",lines:["We are Team Unique-UNIMAID from University of Maiduguri.","Five students. Five disciplines. One mission.","We built ShopLedger because we watched this problem every day —","in our families, in our market, in our city.","We are not building FOR Nigerians.","We ARE Nigerians building for ourselves."]},
  {time:"2:40–3:00",label:"CLOSE",lines:["Hajiya Fatima deserves to know her numbers.","Her business deserves to grow.","And 39 million traders like her deserve a chance.","ShopLedger.","Her voice. Her ledger. Her future."]}
];
var scriptSeg=0,scriptLine=0,scriptRunning=false,scriptSpeed=3500,scriptTimer=null;

/* ════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════ */
function rand(a){return a[Math.floor(Math.random()*a.length)];}
function fmt(n){return Number(n||0).toLocaleString();}
function openOPay(){
  var f=document.createElement('iframe');f.style.display='none';f.src='opay://';
  document.body.appendChild(f);
  setTimeout(function(){document.body.removeChild(f);window.open('https://play.google.com/store/apps/details?id=team.opay.pay','_blank');},1500);
}
function showToast(msg,color){
  color=color||'#00A896';
  var t=document.createElement('div');t.className='toast';t.style.background=color;t.textContent=msg;
  document.body.appendChild(t);setTimeout(function(){if(t.parentNode)t.remove();},3500);
}
function sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}

/* ════════════════════════════════════════════
   SMART AI PROCESSOR
════════════════════════════════════════════ */
function smartProcess(text){
  var t=text.toLowerCase();
  var incW=['sold','sell','received','earned','sayar','income','sale','paid me','customer','got','collected','na sami','na sayar','sami','shigar'];
  var expW=['bought','buy','spent','paid','cost','transport','rent','sayi','expense','fee','na biya','na saya','saya','kudin'];
  var isIncome=incW.some(function(w){return t.indexOf(w)>=0;});
  var isExpense=!isIncome&&expW.some(function(w){return t.indexOf(w)>=0;});
  var type=isIncome?'INCOME':(isExpense?'EXPENSE':'INCOME');
  var nums=(text.match(/\d[\d,.]*/g)||[]).map(function(n){return parseFloat(n.replace(/,/g,''));}).filter(function(n){return n>0&&n<10000000;});
  var amount=nums.length?Math.max.apply(null,nums):0;
  var catMap={rice:'Rice Sales',grain:'Grain Sales',beans:'Beans/Legumes',maize:'Maize Sales',shinkafa:'Rice Sales',wake:'Beans Sales',fabric:'Fabric Sales',yadi:'Fabric Sales',cloth:'Cloth Sales',egg:'Egg Sales',oil:'Oil Sales',tomato:'Tomato Sales',pepper:'Pepper Sales',fish:'Fish Sales',meat:'Meat Sales',transport:'Transport',fuel:'Fuel',rent:'Rent',phone:'Electronics',bag:'Bags',stock:'Stock Purchase',bread:'Bread Sales',water:'Water Sales',food:'Food Sales',groundnut:'Groundnut Sales',onion:'Onion Sales'};
  var category=type==='INCOME'?'General Sales':'General Expense';
  Object.keys(catMap).forEach(function(k){if(t.indexOf(k)>=0)category=catMap[k];});
  return{type:type,category:category,amount:amount,description:text.length>45?text.slice(0,45)+'...':text,items:text,confidence:amount>0?'HIGH':'MEDIUM',hausa_response:rand(HAUSA_OK),english_response:rand(ENG_OK)};
}

function smartReport(txns){
  var income=txns.filter(function(t){return t.type==='INCOME';}).reduce(function(s,t){return s+t.amount;},0);
  var expenses=txns.filter(function(t){return t.type==='EXPENSE';}).reduce(function(s,t){return s+t.amount;},0);
  var cats={};txns.forEach(function(t){cats[t.category]=(cats[t.category]||0)+t.amount;});
  var top=Object.entries(cats).sort(function(a,b){return b[1]-a[1];})[0];
  var score=Math.min(100,Math.floor(txns.length*8+(income-expenses>0?20:0)+(income>10000?15:0)));
  var tips=["Keep recording daily to improve your loan score.","Your top category is growing — increase stock.","Reduce expenses to maximise profit.","90 days of records unlocks bigger OPay loans."];
  var hausa=["Kasuwancin ka na tafiya lafiya! Ci gaba.","Ka yi aiki mai kyau! Rikodin ka zai taimaka.","ShopLedger yana taimaka ka gina tarihin kudin ka.","Ci gaba! OPay rance zai yiwu da rikodin mai kyau."];
  return{total_income:income,total_expenses:expenses,net_profit:income-expenses,top_category:top?top[0]:'General',advice:rand(tips),hausa_summary:rand(hausa),loan_score:score,loan_eligible:score>=50,loan_amount:score>=50?Math.floor(income*2/1000)*1000:0,categories:cats};
}

/* ════════════════════════════════════════════
   SPEECH RECOGNITION
════════════════════════════════════════════ */
function hasSpeechAPI(){
  return !!(window.SpeechRecognition||window.webkitSpeechRecognition);
}

function startVoice(){
  if(voiceState==='processing')return;
  if(voiceState==='listening'){stopVoice();return;}

  if(!hasSpeechAPI()){
    showToast('Open this file in Chrome browser','#E63946');
    return;
  }

  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.lang=currentLang;
  recognition.continuous=true;
  recognition.interimResults=true;
  recognition.maxAlternatives=1;

  liveTranscript='';finalTranscript='';
  voiceState='listening';
  renderHome();

  recognition.onresult=function(e){
    var interim='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal){finalTranscript+=e.results[i][0].transcript+' ';}
      else{interim+=e.results[i][0].transcript;}
    }
    liveTranscript=(finalTranscript+interim).trim();
    updateTranscriptDisplay();
  };

  recognition.onerror=function(e){
    voiceState='idle';
    if(e.error==='not-allowed'||e.error==='permission-denied'){
      showToast('Allow microphone permission in Chrome','#E63946');
    } else if(e.error==='no-speech'){
      showToast('No speech detected — tap mic and try again','#F4A261');
    } else {
      showToast('Mic error: '+e.error,'#E63946');
    }
    renderHome();
  };

  recognition.onend=function(){
    if(voiceState==='listening'){
      // Auto-stopped — show what we got
      voiceState='idle';
      if(liveTranscript.trim()){
        renderHome();
      } else {
        showToast('Nothing heard — tap mic and try again','#F4A261');
        renderHome();
      }
    }
  };

  try{recognition.start();}
  catch(err){voiceState='idle';showToast('Could not start mic','#E63946');renderHome();}
}

function stopVoice(){
  if(recognition){try{recognition.stop();}catch(e){}}
  voiceState='idle';
  renderHome();
}

function updateTranscriptDisplay(){
  var el=document.getElementById('live-transcript');
  if(!el)return;
  el.innerHTML='<span class="transcript-label">RECORDING:</span>'
    +liveTranscript
    +'<span class="cursor"></span>';
  var sb=document.getElementById('save-voice-btn');
  if(sb)sb.style.display=liveTranscript.trim()?'block':'none';
}

function saveVoiceTx(){
  if(!liveTranscript.trim())return;
  processTx(liveTranscript.trim());
  liveTranscript='';finalTranscript='';
}

function processTx(text){
  voiceState='processing';renderHome();
  setTimeout(function(){
    var result=smartProcess(text);
    result.id=Date.now();result.raw=text;result.date=new Date().toLocaleDateString('en-NG');
    transactions.unshift(result);lastResult=result;
    voiceState='idle';liveTranscript='';finalTranscript='';
    showToast(result.english_response,'#00A896');
    renderHome();
  },900);
}

/* ════════════════════════════════════════════
   TAB SWITCHING
════════════════════════════════════════════ */
function showTab(tab){
  document.querySelectorAll('.content').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.nav-btn').forEach(function(el){el.classList.remove('active');});
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  currentTab=tab;
  if(tab==='home')renderHome();
  if(tab==='ledger')renderLedger();
  if(tab==='report')renderReport();
  if(tab==='script')renderScript();
  if(tab==='present')renderPresentTab();
}

/* ════════════════════════════════════════════
   RENDER HOME
════════════════════════════════════════════ */
function renderHome(){
  var p=document.getElementById('page-home');

  var lastHTML='';
  if(lastResult){
    var col=lastResult.type==='INCOME'?'#2DC653':'#E63946';
    lastHTML='<div class="result-card" style="border:1.5px solid '+col+'">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start">'
      +'<div><div style="font-size:11px;color:#8A9BB0;font-weight:600">'+lastResult.type+' SAVED ✅</div>'
      +'<div style="font-size:16px;font-weight:700;margin-top:2px">'+lastResult.description+'</div>'
      +'<div style="font-size:12px;color:#8A9BB0">'+lastResult.category+'</div></div>'
      +'<div style="font-size:22px;font-weight:900;color:'+col+'">'+(lastResult.type==='INCOME'?'+':'-')+'₦'+fmt(lastResult.amount)+'</div>'
      +'</div>'
      +'<div style="margin-top:10px;background:#F2F6F8;border-radius:10px;padding:8px 12px;font-size:13px;font-style:italic">🇳🇬 '+lastResult.hausa_response+'</div>'
      +'</div>';
  }

  // Permission warning if no speech API
  var permHTML='';
  if(!hasSpeechAPI()){
    permHTML='<div class="perm-banner">⚠️ Open this file in <strong>Google Chrome</strong> to enable real voice recording</div>';
  }

  // Language selector
  var langHTML='<div class="lang-bar">'

function renderScript(){
  var p=document.getElementById('page-script');

  p.innerHTML='<div class="section-title">🎬 Video Script</div>'

    +'<div style="background:#F4A261;color:#fff;border-radius:20px;padding:4px 14px;display:inline-block;font-size:12px;font-weight:700;margin-bottom:12px">⏱ '+seg.time+'</div>'
    +'<div class="prompter">'+seg.lines.map(function(l,i){
      var act=i===scriptLine;var past=i<scriptLine;
      return '<div style="padding:6px 0;font-size:'+(act?'19px':'12px')+';font-weight:'+(act?900:400)+';color:'+(act?'#00A896':past?'rgba(255,255,255,0.18)':'rgba(255,255,255,0.5)')+';text-align:center;transition:all .3s;line-height:1.4">'+(act?'▶ ':'')+l+'</div>';
    }).join('')+'</div>'
    +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'
    +'<div style="flex:1;background:#D4E4E9;border-radius:20px;height:6px"><div style="width:'+pct+'%;background:#00A896;height:100%;border-radius:20px;transition:width .3s"></div></div>'
    +'<span style="font-size:12px;color:#8A9BB0;font-weight:700">'+(scriptLine+1)+'/'+seg.lines.length+'</span></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">'
    +'<button style="border-radius:12px;padding:12px;font-size:20px;cursor:pointer;border:1.5px solid #D4E4E9;background:#fff" onclick="sPrev()">⬅️</button>'
    +'<button style="border-radius:12px;padding:12px;font-size:20px;cursor:pointer;border:none;background:'+(scriptRunning?'#E63946':'#00A896')+'" onclick="sToggle()">'+(scriptRunning?'⏸':'▶️')+'</button>'
    +'<button style="border-radius:12px;padding:12px;font-size:20px;cursor:pointer;border:1.5px solid #D4E4E9;background:#fff" onclick="sNext()">➡️</button>'
    +'</div>'
    +'<div style="background:#fff;border-radius:14px;padding:14px;margin-bottom:12px">'
    +'<div style="font-size:11px;font-weight:800;color:#8A9BB0;text-transform:uppercase;margin-bottom:8px">Speed</div>'
    +'<div style="display:flex;gap:8px">'
    +[['Slow',5000],['Normal',3500],['Fast',2200]].map(function(s){return '<button style="flex:1;border-radius:10px;padding:8px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid '+(scriptSpeed===s[1]?'#00A896':'#D4E4E9')+';background:'+(scriptSpeed===s[1]?'#00A896':'#F2F6F8')+';color:'+(scriptSpeed===s[1]?'#fff':'#003049')+'" onclick="setSpeed('+s[1]+')">'+s[0]+'</button>';}).join('')
    +'</div></div>'
    +'<button class="btn btn-outline" onclick="sReset()" style="margin-bottom:14px">🔄 Reset</button>';
}
function setSeg(i){scriptSeg=i;scriptLine=0;sReset();}
function sReset(){scriptRunning=false;scriptLine=0;clearInterval(scriptTimer);if(currentTab==='script')renderScript();}
function sPrev(){scriptLine=Math.max(0,scriptLine-1);if(currentTab==='script')renderScript();}
function sNext(){scriptLine=Math.min(SCRIPT[scriptSeg].lines.length-1,scriptLine+1);if(currentTab==='script')renderScript();}
function setSpeed(s){scriptSpeed=s;if(currentTab==='script')renderScript();}
function sToggle(){
  if(scriptRunning){clearInterval(scriptTimer);scriptRunning=false;}
  else{scriptRunning=true;scriptTimer=setInterval(function(){
    var tot=SCRIPT[scriptSeg].lines.length;
    if(scriptLine+1>=tot){clearInterval(scriptTimer);scriptRunning=false;}else{scriptLine++;}
    if(currentTab==='script')renderScript();
  },scriptSpeed);}
  if(currentTab==='script')renderScript();
}

function launchPresent(){slideIdx=0;renderSlide();document.getElementById('present-overlay').style.display='flex';}
function closePresent(){document.getElementById('present-overlay').style.display='none';}

function renderSlide(){
  var ov=document.getElementById('present-overlay');
  var S=SLIDES[slideIdx];
  var dots=SLIDES.map(function(_,i){return '<div onclick="goSlide('+i+')" style="width:'+(i===slideIdx?22:8)+'px;height:8px;border-radius:8px;background:'+(i===slideIdx?'#00A896':'rgba(255,255,255,0.25)')+';cursor:pointer;transition:all .3s"></div>';}).join('');
  ov.innerHTML='<div class="slide-area" id="slide-area" style="background:'+S.bg+';flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-y:auto;padding:20px">'+S.fn()+'</div>'
    +'<div style="background:rgba(0,0,0,0.7);padding:8px;display:flex;justify-content:center;gap:6px">'+dots+'</div>'
    +'<div style="background:#111;padding:10px 16px;display:flex;align-items:center;gap:8px">'
    +'<button onclick="closePresent()" style="background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:8px 12px;font-size:13px;cursor:pointer;font-weight:700">✕</button>'
    +'<button onclick="goSlide(slideIdx-1)" '+(slideIdx===0?'disabled':'')+' style="flex:1;background:'+(slideIdx===0?'rgba(255,255,255,0.05)':'rgba(255,255,255,0.15)')+';color:'+(slideIdx===0?'rgba(255,255,255,0.25)':'#fff')+';border:none;border-radius:10px;padding:11px;font-size:20px;cursor:'+(slideIdx===0?'not-allowed':'pointer')+'">←</button>'
    +'<div style="color:#fff;font-size:13px;font-weight:700;min-width:52px;text-align:center">'+(slideIdx+1)+'/'+SLIDES.length+'</div>'
    +'<button onclick="goSlide(slideIdx+1)" '+(slideIdx===SLIDES.length-1?'disabled':'')+' style="flex:1;background:'+(slideIdx===SLIDES.length-1?'rgba(255,255,255,0.05)':'#00A896')+';color:'+(slideIdx===SLIDES.length-1?'rgba(255,255,255,0.25)':'#fff')+';border:none;border-radius:10px;padding:11px;font-size:20px;cursor:'+(slideIdx===SLIDES.length-1?'not-allowed':'pointer')+'">→</button>'
    +'<button onclick="openOPay()" style="background:#00C853;color:#fff;border:none;border-radius:10px;padding:8px 12px;font-size:13px;font-weight:800;cursor:pointer">🏦</button>'
    +'</div>';
}

function goSlide(n){
  if(n<0||n>=SLIDES.length)return;
  var area=document.getElementById('slide-area');
  if(area)area.style.opacity='0';
  setTimeout(function(){slideIdx=n;renderSlide();},220);
}

document.addEventListener('keydown',function(e){
  if(document.getElementById('present-overlay').style.display!=='none'){
    if(e.key==='ArrowRight')goSlide(slideIdx+1);
    if(e.key==='ArrowLeft')goSlide(slideIdx-1);
    if(e.key==='Escape')closePresent();
  }
});
